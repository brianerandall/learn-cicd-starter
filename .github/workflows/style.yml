name: style

on:
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Check styling
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - name: Check styling
        run: test -z $(go fmt ./...)
