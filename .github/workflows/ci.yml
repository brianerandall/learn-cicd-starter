name: ci

on:
  pull_request:
    branches: [main]

job:
  tests:
    name: Tests
    runs-on: ubuntu-latest

  steps:
    - name: Check out code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/set-go@v6
      with:
        go-version: "1.26.0"

    - name: Force Failure
      run: (exit 1)
